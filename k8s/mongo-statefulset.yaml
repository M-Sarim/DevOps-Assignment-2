apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  labels:
    app: mongo
spec:
  serviceName: "mongo"
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:6.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      # Mount the pre-created PersistentVolumeClaim (mongo-pvc)
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-pvc
  # Note: replicas=1 uses the single PVC `mongo-pvc`. For multiple replicas,
  # consider using `volumeClaimTemplates` so each pod gets its own PVC.
